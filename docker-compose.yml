name: plantilla-arca

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arca_app
    environment:
      DATABASE_URL: postgresql://arca_user:umbot_directus_2025@172.20.0.3:5432/arca_facturas
      ARCA_HOMOLOGACION: "true"
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - .:/app
      - ./certs:/app/certs:ro
      - ./output:/app/output
    command: streamlit run src/web/streamlit_app.py --server.baseUrlPath /plantilla-arca
    networks:
      - umbot-network
    restart: unless-stopped

networks:
  umbot-network:
    external: true
    name: fumbling-field_umbot-network
